<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="hero">
      <div class="hero__header">
        <div class="header__logo">Header Logo</div>
        <ul class="header__navigation-links">
          <li><a href="#">header link one</a></li>
          <li><a href="#">header link two</a></li>
          <li><a href="#">header link three</a></li>
        </ul>
      </div>
      <div class="hero__content">
        <div class="hero__content-left">
          <h1 class="content__main-text">This website is awesome</h1>
          <p class="content__secondary-text">
            This website has some subtext that goes here under the main title.
            It's a smaller font and the color is lower contrast.
          </p>
          <button class="content__button">Sign up</button>
        </div>
        <div class="content__image-container">
          <img
            src="img/hero-image.png"
            width="400"
            height="300"
            alt="just a random picture"
          />
        </div>
      </div>
    </div>
  </body>
</html>
